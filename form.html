<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APPLICATION FORM</title>
</head>
<body bgcolor="green">
    
    <fieldset>
    <h1 style="color: white; text-align: center;">APPLICATION FORM</h1>
    <br><br>
        
    <form>
    <div align="center">
        <label style="color: white;">First Name: </label>
        <input type="text" name="firstname" >
        &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;
    
                
        <label style="color: white;">Last Name: </label>
        <input type="text" name="lastname" >
    </div>
    <br><br>
    <div align="center">
        <label style="color: white;">Date of Birth:</label>
        <input type="date">
        &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;  &nbsp; &nbsp; &nbsp;


        <label style="color: white;">Age:</label>
        <input type="number">
    </div>
    <br><br>
    <div align="center">
        <label style="color: white;">Gender: </label>
        <select name="gender">
            <option value="male">Male</option>
            <option value="female">Female</option>
        </select>
        &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;&nbsp; &nbsp; &nbsp;
    
                
        <label style="color: white;">Email Address: </label>
        <input type="email" placeholder="user@gmail.com" >
    </div>
    <br><br>

    <div align="center">
        <label style="color: white;">Positions Available:</label> &nbsp;&nbsp;
        <input type="radio"><label style="color: white;">Junior Developer</label>
        <input type="radio"><label style="color: white;">Mid-level Developer</label>
        <input type="radio"><label style="color: white;">Senior Developer</label>
    </div>
    <br><br>

    <div align="center">
        <label style="color: white;">Programming Languages: </label>
        &nbsp; &nbsp;&nbsp;&nbsp;&nbsp;
        <input type="checkbox">
        <label style="color: white;">Java</label>
        <input type="checkbox">
        <label style="color: white;">Java Script</label>
        <input type="checkbox">
        <label style="color: white;">Python</label>
    </div>
    <br><br>

    <div align="center">
        <label style="color: white;">Password</label>
        <input type="password">
        &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;&nbsp; &nbsp; &nbsp;

        <label style="color: white;">Confirm Password</label>
        <input type="password">
    </div>
    <br><br>

    <div align="center">
        <input type="submit">
        &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;&nbsp; &nbsp; &nbsp;
        <input type="reset">
    </div>

    </form>

    </fieldset>
</body>
</html>
